[pytest]
# Root pytest config: enforce canonical test discovery under ./tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
testpaths = tests
minversion = 3.8
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -p no:cacheprovider
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    e2e: marks tests as end-to-end tests
    memory: marks tests related to memory system
    thinking: marks tests related to sequential thinking
    mcp: marks tests related to MCP integration
    cim: marks tests related to CIM module
